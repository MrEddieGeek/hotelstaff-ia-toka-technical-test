server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Cabeceras de seguridad (aplican a todas las respuestas)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:8080; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Ocultar versión de nginx
    server_tokens off;

    # SPA fallback — todas las rutas caen en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets inmutables
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Evita cachear el HTML principal
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Bloquea acceso a archivos sensibles
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
