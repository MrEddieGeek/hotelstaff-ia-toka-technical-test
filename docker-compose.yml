version: "2.2"

x-python-service: &python-service
  env_file: .env
  restart: unless-stopped
  networks: [hotelstaff-net]

x-node-service: &node-service
  env_file: .env
  restart: unless-stopped
  networks: [hotelstaff-net]

networks:
  hotelstaff-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  qdrant-data:

services:
  # ---------------------------------------------------------
  # Infraestructura
  # ---------------------------------------------------------
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotelstaff}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-hotelstaff}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [hotelstaff-net]

  mongodb:
    image: docker.io/mongo:7
    ports: ["27017:27017"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [hotelstaff-net]

  redis:
    image: docker.io/redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [hotelstaff-net]

  rabbitmq:
    image: docker.io/rabbitmq:4-management-alpine
    environment:
      HOME: /tmp
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5672 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [hotelstaff-net]

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [hotelstaff-net]

  # ---------------------------------------------------------
  # Microservicios
  # ---------------------------------------------------------
  auth-service:
    <<: *python-service
    build: { context: ., dockerfile: services/auth/Dockerfile }
    ports: ["8001:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./secrets:/run/secrets:ro

  user-service:
    <<: *python-service
    build: { context: ., dockerfile: services/user/Dockerfile }
    ports: ["8002:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    volumes:
      - ./secrets:/run/secrets:ro

  role-service:
    <<: *python-service
    build: { context: ., dockerfile: services/role/Dockerfile }
    ports: ["8003:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    volumes:
      - ./secrets:/run/secrets:ro

  audit-service:
    <<: *python-service
    build: { context: ., dockerfile: services/audit/Dockerfile }
    ports: ["8004:8000"]
    depends_on:
      mongodb: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    volumes:
      - ./secrets:/run/secrets:ro

  ia-agent:
    <<: *python-service
    build: { context: ., dockerfile: services/ia-agent/Dockerfile }
    ports: ["8005:8000"]
    depends_on:
      qdrant: { condition: service_started }
      rabbitmq: { condition: service_healthy }
    volumes:
      - ./secrets:/run/secrets:ro

  # ---------------------------------------------------------
  # BFF y Frontend
  # ---------------------------------------------------------
  bff:
    <<: *node-service
    build: { context: ./bff, dockerfile: Dockerfile }
    ports: ["${BFF_PORT:-8080}:8080"]
    depends_on:
      - auth-service
      - user-service
      - role-service
      - audit-service
      - ia-agent
    volumes:
      - ./secrets:/run/secrets:ro

  frontend:
    <<: *node-service
    build: { context: ./frontend, dockerfile: Dockerfile }
    ports: ["${FRONTEND_PORT:-3000}:8080"]
    depends_on: [bff]
